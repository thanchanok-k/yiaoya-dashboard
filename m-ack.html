<!DOCTYPE html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>เอกสารรอรับทราบ · Yiaoya</title>
<link rel="stylesheet" href="m-shared.css">
<style>
.sec{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:700;margin-bottom:10px}
.num{width:23px;height:23px;border-radius:50%;background:var(--teal);color:#04342C;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.flbl{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
.hint{font-size:11.5px;color:var(--faint);margin-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:8px 13px;border:1px solid var(--border);border-radius:99px;font-size:13px;cursor:pointer;background:#fff}
.chip.on{background:var(--teal);color:#04342C;border-color:var(--teal);font-weight:700}
/* ── ack-specific (ใช้ token แบรนด์เดิมทั้งหมด) ── */
.dtype{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:99px;background:#E6F7F5;color:#0F766E;margin-bottom:8px}
.dtype.disc{background:#FEE2E2;color:#991B1B}
.dtitle{font-size:15px;font-weight:700;color:var(--navy);line-height:1.45}
.dmeta{font-size:12px;color:var(--muted);margin-top:5px}
.dbody{font-size:13px;color:var(--text);margin-top:8px;line-height:1.55;white-space:pre-wrap}
.acts{display:flex;gap:9px;margin-top:13px}
.acts button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;border:none}
.btn-ack{background:var(--teal);color:#04342C}
.btn-decline{background:#fff;color:#991B1B;border:1px solid #FCA5A5}
.acts button:disabled{opacity:.45}
.empty{text-align:center;padding:46px 20px;color:var(--faint);font-size:14px}
.empty .ic{width:46px;height:46px;border-radius:50%;background:#E6F7F5;color:#0F766E;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-weight:800;font-size:22px}
.declinebox{margin-top:11px;display:none}
.declinebox.on{display:block}
.declinebox textarea{font-size:13px}
.done{font-size:12.5px;font-weight:700;color:#0f766e;text-align:center;padding:6px 0}
</style></head>
<body>
<div id="app" style="display:none">
  <div class="note">เอกสารด้านล่างต้องกดรับทราบ · ระบบบันทึกวันเวลาเป็นหลักฐานการรับทราบ</div>
  <div id="list"></div>
</div>
<div id="block" style="display:none"></div>
<script type="module">
import { ID, $, api, mountHead, requireSession, esc } from './m-shared.js';
mountHead('เอกสารรอรับทราบ');
const TYPE_TH={contract:'สัญญาจ้าง',pdpa:'PDPA',handbook:'คู่มือพนักงาน',disciplinary:'หนังสือตักเตือน',policy:'นโยบาย/ประกาศ'};

async function init(){
  if(!await requireSession()) return;
  await load();
}
async function load(){
  $('list').innerHTML='<div class="empty">กำลังโหลด…</div>';
  const r=await api('hr_ack?employee_id='+encodeURIComponent(ID.employee_id)+'&pending=1');
  if(r&&r.error){$('list').innerHTML='<div class="warn">โหลดไม่สำเร็จ: '+esc(r.error)+'</div>';return;}
  const docs=(r&&r.pending)||[];
  if(!docs.length){$('list').innerHTML='<div class="empty"><div class="ic">✓</div>ไม่มีเอกสารค้าง</div>';return;}
  $('list').innerHTML=docs.map((d,i)=>card(d,i)).join('');
  docs.forEach((d,i)=>wire(d,i));
}
function card(d,i){
  const isDisc=d.doc_type==='disciplinary';
  const meta=[TYPE_TH[d.doc_type]||d.doc_type, d.version?('เวอร์ชัน '+esc(d.version)):''].filter(Boolean).join(' · ');
  return '<div class="card" id="c'+i+'">'+
    '<span class="dtype'+(isDisc?' disc':'')+'">'+esc(TYPE_TH[d.doc_type]||d.doc_type)+'</span>'+
    '<div class="dtitle">'+esc(d.doc_title||d.doc_id)+'</div>'+
    '<div class="dmeta">'+esc(meta)+'</div>'+
    (d.body?'<div class="dbody">'+esc(d.body)+'</div>':'')+
    '<div class="acts">'+
      '<button class="btn-ack" id="a'+i+'">รับทราบ</button>'+
      (isDisc?'<button class="btn-decline" id="x'+i+'">ไม่เห็นด้วย</button>':'')+
    '</div>'+
    (isDisc?'<div class="declinebox" id="db'+i+'"><label class="flbl">เหตุผลที่ไม่เห็นด้วย</label>'+
      '<textarea id="dn'+i+'" rows="2" maxlength="500" placeholder="ระบุเหตุผล (ถ้ามี)"></textarea>'+
      '<div class="acts"><button class="btn-decline" id="dx'+i+'">ยืนยันไม่เห็นด้วย</button></div></div>':'')+
    '<div class="msg" id="m'+i+'"></div>'+
  '</div>';
}
function wire(d,i){
  $('a'+i).onclick=()=>submit(d,i,'accepted','');
  if(d.doc_type==='disciplinary'){
    $('x'+i).onclick=()=>$('db'+i).classList.toggle('on');
    $('dx'+i).onclick=()=>{const note=($('dn'+i).value||'').trim();submit(d,i,'declined',note);};
  }
}
async function submit(d,i,decision,note){
  const m=$('m'+i);['a'+i,'x'+i,'dx'+i].forEach(id=>{const e=$(id);if(e)e.disabled=true;});
  m.style.color='var(--muted)';m.textContent='กำลังบันทึก…';
  const r=await api('hr_ack',{action:'ack',employee_id:ID.employee_id,doc_type:d.doc_type,doc_id:d.doc_id,
    doc_title:d.doc_title||'',version:d.version||'',decision,note});
  if(r&&r.error){['a'+i,'x'+i,'dx'+i].forEach(id=>{const e=$(id);if(e)e.disabled=false;});
    m.style.color='#b91c1c';m.textContent='ผิดพลาด: '+esc(r.error);return;}
  const c=$('c'+i);
  c.innerHTML='<span class="dtype'+(d.doc_type==='disciplinary'?' disc':'')+'">'+esc(TYPE_TH[d.doc_type]||d.doc_type)+'</span>'+
    '<div class="dtitle">'+esc(d.doc_title||d.doc_id)+'</div>'+
    '<div class="done">'+(decision==='declined'?'บันทึก “ไม่เห็นด้วย” แล้ว ✓':'รับทราบแล้ว ✓')+'</div>';
  setTimeout(checkEmpty,400);
}
function checkEmpty(){
  if(![...$('list').querySelectorAll('.acts')].length){
    $('list').innerHTML='<div class="empty"><div class="ic">✓</div>ไม่มีเอกสารค้าง</div>';
  }
}
init();
</script></body></html>
