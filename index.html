<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>YY Integration Hub · Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
:root{
  --navy:#0D2F4F; --navy-2:#185FA5; --teal:#3DC5B7; --teal-dark:#2BA89B; --teal-ink:#0F766E;
  --bg:#FAFBFC; --surface:#FFFFFF; --border:#E8ECF1; --border-strong:#CBD5E1;
  --text:#0F172A; --text-muted:#64748B; --text-faint:#94A3B8;
  --success:#047857; --success-bg:#ECFDF5; --info:#1D4ED8; --info-bg:#EFF6FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai','Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{padding:24px 28px 60px;max-width:1280px;margin:0 auto}

/* ===== GREETING HEADER (gradient) ===== */
.head{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
.greeting{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);color:#fff;border-radius:12px;padding:16px 22px;flex:1;display:flex;align-items:center;gap:14px}
.greeting .logo{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:22px;flex:none}
.greeting h1{font-size:18px;font-weight:600;letter-spacing:-.01em}
.greeting .sub{font-size:12px;opacity:.82;display:flex;align-items:center;gap:7px;margin-top:3px}
.greeting .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(61,197,183,.25);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,197,183,.45)}70%{box-shadow:0 0 0 7px rgba(61,197,183,0)}100%{box-shadow:0 0 0 0 rgba(61,197,183,0)}}
.logout{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:8px 14px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.logout:hover{background:rgba(255,255,255,.2)}.logout i{font-size:16px}

/* ===== STAT CARDS ===== */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:6px}
@media(max-width:1180px){.stats{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 15px;transition:.15s}
.acard:hover{transform:translateY(-2px);border-color:var(--teal)}
.acard .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:17px}
.acard .n{font-size:25px;font-weight:700;line-height:1;margin-top:10px;letter-spacing:-.02em}
.acard .lb{margin-top:7px;font-size:12.5px;color:var(--text-muted);font-weight:500}

/* ===== SECTION ===== */
.sec{display:flex;align-items:center;gap:8px;margin:22px 2px 11px;font-size:14.5px;font-weight:600;color:var(--navy)}
.sec-bar{width:4px;height:16px;border-radius:2px;background:var(--teal)}
.sec-c{margin-left:auto;color:var(--text-faint);font-weight:500;font-size:12.5px;display:inline-flex;align-items:center;gap:5px}
.sec-c .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 1.8s infinite}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--text-muted);font-weight:500;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:11px 16px;border-bottom:1px solid var(--border);background:#FBFCFE}
td{padding:11px 16px;border-bottom:1px solid #F1F4F8;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}tbody tr:hover{background:#FAFBFC}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--text-muted)}
.empty-td{color:var(--text-faint);padding:22px 16px;text-align:center}
.pill{display:inline-block;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:600;text-transform:capitalize}
.pill.dispatched{background:var(--success-bg);color:var(--success)}
.pill.logged{background:#F1F5F9;color:var(--text-muted)}
.flash{animation:fl 1.8s}@keyframes fl{0%{background:#FFF7CC}100%{background:transparent}}

/* ===== LOGIN ===== */
#login{max-width:360px;margin:9vh auto 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;box-shadow:0 8px 30px rgba(13,47,79,.07)}
#login .brand{display:flex;align-items:center;gap:11px;margin-bottom:18px}
#login .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;display:grid;place-items:center;font-size:22px}
#login h2{color:var(--navy);font-size:17px;font-weight:600}#login .tag{color:var(--text-muted);font-size:12px;margin-top:1px}
#login label{display:block;font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin:14px 0 5px}
#login input{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:8px;font:inherit;font-size:14px;color:var(--text);transition:.15s}
#login input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,47,79,.1)}
#login button{width:100%;margin-top:20px;padding:11px;background:var(--teal);color:#fff;border:1px solid var(--teal);border-radius:8px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
#login button:hover{background:var(--teal-dark);border-color:var(--teal-dark)}
#err{color:#B91C1C;font-size:12.5px;margin-top:10px;min-height:18px}
.sys-wrap{padding:14px 16px;display:flex;gap:10px;flex-wrap:wrap}
.sys{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;color:var(--text)}
.sys .d{width:9px;height:9px;border-radius:50%;flex:none}
.sys.on{border-color:#A7F3D0;background:#F0FDFA}.sys.on .d{background:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.sys.off{color:var(--text-faint);background:#FBFCFE}.sys.off .d{background:#CBD5E1}
.sys .ct{font-size:11px;color:var(--text-faint);font-weight:500}
.hidden{display:none}
</style></head><body>

<div id="login">
  <div class="brand"><div class="logo"><i class="ti ti-topology-star-3"></i></div>
    <div><h2>YY Integration Hub</h2><div class="tag">ศูนย์รวมข้อมูลแบบเรียลไทม์</div></div></div>
  <label>อีเมล</label><input id="email" type="email" placeholder="admin@yiaoya-hub.com" autocomplete="username">
  <label>รหัสผ่าน</label><input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
  <button id="btn"><i class="ti ti-login-2"></i> เข้าสู่ระบบ</button>
  <div id="err"></div>
</div>

<div id="app" class="hidden"><div class="wrap">
  <div class="head">
    <div class="greeting">
      <div class="logo"><i class="ti ti-topology-star-3"></i></div>
      <div><h1>YY Integration Hub</h1>
        <div class="sub"><span class="dot"></span><span id="upd">กำลังเชื่อมต่อ realtime…</span></div></div>
    </div>
    <button class="logout" id="logout"><i class="ti ti-logout"></i> ออกจากระบบ</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="sec"><span class="sec-bar"></span>สถานะการเชื่อมต่อระบบ (Ecosystem)<span class="sec-c" id="sysCount"></span></div>
  <div class="sys-wrap card" id="integration"></div>

  <div class="sec"><span class="sec-bar"></span>เหตุการณ์ล่าสุด (Events)<span class="sec-c"><span class="dot"></span>realtime</span></div>
  <div class="card"><div id="events"></div></div>

  <div class="grid2">
    <div><div class="sec"><span class="sec-bar"></span>สาขา (Branches)</div><div class="card"><div id="branches"></div></div></div>
    <div><div class="sec"><span class="sec-bar"></span>พนักงาน (Employees)</div><div class="card"><div id="employees"></div></div></div>
    <div><div class="sec"><span class="sec-bar"></span>ราคา (Prices)</div><div class="card"><div id="prices"></div></div></div>
    <div><div class="sec"><span class="sec-bar"></span>การชำระเงิน (Payments)</div><div class="card"><div id="payments"></div></div></div>
    <div><div class="sec"><span class="sec-bar"></span>นัดหมาย (Appointments)</div><div class="card"><div id="appointments"></div></div></div>
  </div>
</div></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL="https://iyldrlzhftylewstfmsg.supabase.co", ANON="sb_publishable_jLTyhyQ60OBRiT7CATCNDg_7bhmMrCK";
const sb=createClient(SB_URL, ANON);
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

const SYSTEMS=[
 {k:'hr',lb:'HR',ic:'ti-users-group'},
 {k:'fo',lb:'Front Office',ic:'ti-calendar-event'},
 {k:'pricing',lb:'Pricing',ic:'ti-tag'},
 {k:'accountant',lb:'Accountant',ic:'ti-cash'},
 {k:'purchase',lb:'Purchase',ic:'ti-shopping-cart'},
 {k:'jera',lb:'JERA',ic:'ti-cloud'},
];
function renderIntegration(sources){
 const counts={}; sources.forEach(s=>{counts[s]=(counts[s]||0)+1;});
 let on=0;
 $('integration').innerHTML=SYSTEMS.map(sy=>{
  const c=counts[sy.k]||0, isOn=c>0; if(isOn)on++;
  return '<div class="sys '+(isOn?'on':'off')+'"><span class="d"></span><i class="ti '+sy.ic+'"></i>'+sy.lb+
   (isOn?'<span class="ct">'+c+' events</span>':'<span class="ct">รอเชื่อมต่อ</span>')+'</div>';
 }).join('');
 $('sysCount').textContent=on+'/'+SYSTEMS.length+' ระบบเชื่อมต่อแล้ว';
}

function tbl(rows,cols,opt={}){
 if(!rows||!rows.length)return '<table><tr><td class="empty-td">'+(opt.empty||'— ยังไม่มีข้อมูล —')+'</td></tr></table>';
 let h='<table><thead><tr>'+cols.map(c=>'<th>'+c.h+'</th>').join('')+'</tr></thead><tbody>';
 rows.forEach((r,i)=>{h+='<tr'+(opt.flash&&i===0?' class="flash"':'')+'>'+cols.map(c=>{
   let v=esc(r[c.k]);
   if(c.t==='status')v='<span class="pill '+(r[c.k]||'')+'">'+v+'</span>';
   else if(c.t==='mono')v='<span class="mono">'+v+'</span>';
   return '<td>'+v+'</td>';}).join('')+'</tr>';});
 return h+'</tbody></table>';}

async function loadAll(flash){
 const q=(t,c,o={})=>sb.from(t).select(c).order(o.by||'updated_at',{ascending:false}).limit(o.lim||50);
 const [ev,br,em,pr,pm,ap,src]=await Promise.all([
  sb.from('events').select('seq,event_type,source,entity_id,status').order('seq',{ascending:false}).limit(15),
  q('branches','branch_id,code,name',{by:'branch_id'}),
  q('employees','employee_id,full_name,branch_id,position',{lim:300}),
  q('prices','price_code,name,price,branch_id'),
  q('payments','payment_id,amount,branch_id,status'),
  q('appointments','appointment_id,service,branch_id,status'),
  sb.from('events').select('source').order('seq',{ascending:false}).limit(1000),
 ]);
 renderIntegration((src.data||[]).map(r=>r.source));
 const d={events:ev.data||[],branches:br.data||[],employees:em.data||[],prices:pr.data||[],payments:pm.data||[],appointments:ap.data||[]};
 const stats=[
  {k:'events',n:d.events.length,lb:'Events',ic:'ti-activity',bg:'#EFF6FF',fg:'#1D4ED8'},
  {k:'branches',n:d.branches.length,lb:'Branches',ic:'ti-building-store',bg:'#E6F7F5',fg:'#0F766E'},
  {k:'employees',n:d.employees.length,lb:'Employees',ic:'ti-users-group',bg:'#F5F3FF',fg:'#6D28D9'},
  {k:'prices',n:d.prices.length,lb:'Prices',ic:'ti-tag',bg:'#FFF7ED',fg:'#C2410C'},
  {k:'payments',n:d.payments.length,lb:'Payments',ic:'ti-cash',bg:'#ECFDF5',fg:'#047857'},
  {k:'appointments',n:d.appointments.length,lb:'Appointments',ic:'ti-calendar-event',bg:'#FEF2F2',fg:'#B91C1C'},
 ];
 $('stats').innerHTML=stats.map(s=>'<div class="acard"><div class="ic" style="background:'+s.bg+';color:'+s.fg+'"><i class="ti '+s.ic+'"></i></div><div class="n">'+s.n+'</div><div class="lb">'+s.lb+'</div></div>').join('');
 $('events').innerHTML=tbl(d.events,[{h:'#',k:'seq'},{h:'ประเภท',k:'event_type'},{h:'จาก',k:'source'},{h:'entity',k:'entity_id',t:'mono'},{h:'สถานะ',k:'status',t:'status'}],{flash});
 const empByBr={}; d.employees.forEach(e=>{const b=e.branch_id||'-'; empByBr[b]=(empByBr[b]||0)+1;});
 const brRows=d.branches.map(b=>Object.assign({},b,{emp:(empByBr[b.branch_id]||0)+' คน'}));
 $('branches').innerHTML=tbl(brRows,[{h:'รหัส',k:'branch_id',t:'mono'},{h:'code',k:'code'},{h:'ชื่อ',k:'name'},{h:'พนักงาน',k:'emp'}]);
 $('employees').innerHTML=tbl(d.employees,[{h:'รหัส',k:'employee_id',t:'mono'},{h:'ชื่อ',k:'full_name'},{h:'สาขา',k:'branch_id'},{h:'ตำแหน่ง',k:'position'}]);
 $('prices').innerHTML=tbl(d.prices,[{h:'รหัส',k:'price_code',t:'mono'},{h:'รายการ',k:'name'},{h:'ราคา',k:'price'},{h:'สาขา',k:'branch_id'}],{empty:'⏳ รอเชื่อมต่อระบบ Pricing'});
 $('payments').innerHTML=tbl(d.payments,[{h:'รหัส',k:'payment_id',t:'mono'},{h:'จำนวน',k:'amount'},{h:'สาขา',k:'branch_id'},{h:'สถานะ',k:'status',t:'status'}],{empty:'⏳ รอเชื่อมต่อระบบ Accountant'});
 $('appointments').innerHTML=tbl(d.appointments,[{h:'รหัส',k:'appointment_id',t:'mono'},{h:'บริการ',k:'service'},{h:'สาขา',k:'branch_id'},{h:'สถานะ',k:'status',t:'status'}],{empty:'⏳ รอเชื่อมต่อระบบ Front Office'});
 $('upd').textContent='realtime · อัปเดต '+new Date().toLocaleTimeString('th-TH');
}

function start(){
 $('login').classList.add('hidden'); $('app').classList.remove('hidden');
 loadAll(false);
 sb.channel('events-live').on('postgres_changes',{event:'INSERT',schema:'public',table:'events'},()=>loadAll(true)).subscribe();
}
$('btn').onclick=async()=>{ $('err').textContent='';
 const {error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('pass').value});
 if(error){$('err').textContent='เข้าสู่ระบบไม่สำเร็จ: '+error.message;}else start();};
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn').click();});
$('logout').onclick=async()=>{await sb.auth.signOut();location.reload();};
sb.auth.getSession().then(({data})=>{if(data.session)start();});
</script></body></html>
