<!DOCTYPE html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ปฏิทินลาทีม · Yiaoya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
:root{--navy:#0D2F4F;--teal:#3DC5B7;--border:#E5E7EB;--muted:#6B7280;--faint:#94a3b8;--bg:#F8F9FA;--text:#333333}
*{box-sizing:border-box;font-family:'Inter','Noto Sans Thai',-apple-system,system-ui,sans-serif}
body{margin:0;background:var(--bg);color:var(--text);padding:14px 14px 40px;max-width:480px;margin:0 auto}
.head{background:linear-gradient(135deg,#0D2F4F 0%,#0F766E 100%);color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.head .eb{color:#9FE1CB;font-size:11px;letter-spacing:2px;font-weight:700}
.head h1{font-size:19px;margin:3px 0 2px}.head .who{font-size:12.5px;color:#9fb6c9}
.note{background:#E6F7F5;color:#0F766E;border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:12px;line-height:1.5}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:11px;border:1px solid var(--border)}
.sec{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:700;margin-bottom:10px}
.num{width:23px;height:23px;border-radius:50%;background:var(--teal);color:#04342C;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.dgrp{margin-bottom:13px}
.dgrp:last-child{margin-bottom:0}
.dhead{display:flex;align-items:baseline;gap:8px;font-size:13.5px;font-weight:700;color:var(--navy);margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dhead.today{color:#0F766E}
.dhead .cnt{font-size:11.5px;font-weight:500;color:var(--muted)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;background:#fff;border:1px solid var(--border);margin-bottom:6px}
.row.me{background:#E6F7F5;border-color:var(--teal)}
.row:last-child{margin-bottom:0}
.nm{font-size:14px;color:var(--navy)}
.nm b{font-weight:600}
.nm .span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
.me-pill{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:11px;background:var(--teal);color:#04342C;margin-left:6px}
.tp{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:12px;background:#E6F1FB;color:#0C447C;flex-shrink:0;white-space:nowrap}
.hint{color:var(--faint);font-size:13px;text-align:center;padding:22px 8px;line-height:1.6}
.warn{background:#FEF3C7;color:#92400e;border-radius:10px;padding:13px;font-size:13px;line-height:1.6}
a.lk{color:var(--teal);font-weight:700;text-decoration:none}
</style></head>
<body>
<div class="head"><div class="eb">YIAOYA · HR</div><h1>ปฏิทินลาทีม</h1><div class="who" id="who">—</div></div>
<div id="app" style="display:none">
  <div class="note" id="note">การลาที่อนุมัติแล้วของทีมในเดือนนี้ · เรียงตามวันที่ (อ่านอย่างเดียว)</div>
  <div class="card"><div class="sec"><span class="num" id="monthNum">·</span><span id="monthLbl">เดือนนี้</span></div>
    <div id="list"><div class="hint">กำลังโหลด…</div></div>
  </div>
</div>
<div id="block" style="display:none"><div class="warn" id="blockmsg"></div></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL="https://iyldrlzhftylewstfmsg.supabase.co", ANON="sb_publishable_jLTyhyQ60OBRiT7CATCNDg_7bhmMrCK";
const sb=createClient(SB_URL,ANON);
const $=(id)=>document.getElementById(id);
const TH_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const LEAVE_LABEL={annual:'พักร้อน',sick:'ลาป่วย',personal:'ลากิจ',maternity:'ลาคลอด',paternity:'ลาเลี้ยงดูบุตร',ordination:'ลาบวช',military:'ลาทหาร',emergency:'ลาฉุกเฉิน',special_holiday:'วันหยุดพิเศษ',birthday:'วันเกิด',reward:'วันลารางวัล',other:'อื่นๆ'};
let ID=null; try{ID=JSON.parse(localStorage.getItem('yy_line_id')||'null');}catch(e){}
const block=(h)=>{$('block').style.display='block';$('blockmsg').innerHTML=h;};
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
async function token(){return (await sb.auth.getSession()).data.session?.access_token;}
async function api(path,body){const t=await token();const r=await fetch(SB_URL+'/functions/v1/'+path,{method:body?'POST':'GET',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json',apikey:ANON},body:body?JSON.stringify(body):undefined});return r.json();}
function pad(n){return (n<10?'0':'')+n;}
function thDate(iso){const p=String(iso).split('-');return Number(p[2])+' '+TH_MONTHS[Number(p[1])-1];}

async function init(){
  if(!ID||!ID.employee_id){block('ยังไม่ได้เข้าระบบ — กรุณาเข้าผ่าน LINE ก่อน<br><a class="lk" href="login.html">เข้าสู่ระบบด้วย LINE →</a>');return;}
  $('who').textContent=(ID.employee_name||ID.display_name)+' · '+ID.employee_id;
  let {data:s}=await sb.auth.getSession();
  if(!s.session){const r=await sb.auth.signInAnonymously();if(r.error){block('ระบบยังไม่เปิด anonymous sign-in<br><small>แจ้งแอดมินเปิดใน Supabase → Auth</small>');return;}}
  $('app').style.display='block';
  load();
}

async function load(){
  const now=new Date(Date.now()+7*3600*1000); // Bangkok
  const y=now.getUTCFullYear(), m=now.getUTCMonth()+1;
  const ymPrefix=y+'-'+pad(m);
  const mStart=ymPrefix+'-01', mEnd=ymPrefix+'-'+pad(new Date(y,m,0).getDate());
  $('monthLbl').textContent=TH_MONTHS[m-1]+' '+(y+543);
  $('monthNum').textContent=m;
  const todayIso=now.toISOString().slice(0,10);

  // ดึงพนักงาน → map ชื่อ/ชื่อเล่น/ตำแหน่ง/สาขา + หาสาขาของผู้เรียก
  let empMap={}, myBranch=ID.branch_id||'';
  try{
    const er=await api('hr_list?type=employee.updated&limit=3000');
    (er.items||[]).forEach(e=>{const id=e.employee_id; if(!id)return;
      empMap[id]={nickname:e.nickname||'',full_name:e.full_name||'',position:e.position||'',branch_id:e.branch_id||''};});
    if(!myBranch && empMap[ID.employee_id]) myBranch=empMap[ID.employee_id].branch_id;
  }catch(e){}

  // ดึงการลา (leave.updated = ใบที่ผ่าน flow อนุมัติแล้ว) → กรอง approved + เดือนนี้ + สาขาเดียวกัน
  let leaves=[];
  try{const lr=await api('hr_list?type=leave.updated&limit=3000'); leaves=lr.items||[];}
  catch(e){$('list').innerHTML='<div class="hint">โหลดข้อมูลไม่ได้ ลองใหม่อีกครั้งค่ะ</div>';return;}

  const items=leaves.filter(l=>{
    if(String(l.status||'').toLowerCase()!=='approved') return false;
    if(!l.start_date) return false;
    const s=String(l.start_date), e=String(l.end_date||l.start_date);
    // ทับซ้อนเดือนนี้: start <= สิ้นเดือน && end >= ต้นเดือน
    if(!(s<=mEnd && e>=mStart)) return false;
    // กรองสาขาเดียวกับผู้เรียก (ถ้ารู้สาขา) — ถ้า record ไม่มี branch ก็ fallback ตามสาขาพนักงาน
    const lb=l.branch_id || (empMap[l.employee_id]&&empMap[l.employee_id].branch_id) || '';
    if(myBranch) return lb===myBranch;
    return true;
  });

  if(!items.length){
    $('list').innerHTML='<div class="hint">เดือนนี้ทีมไม่มีใครลา (ที่อนุมัติแล้ว)</div>';
    return;
  }

  // จัดกลุ่มตาม "วันเริ่มลา" ที่ตกอยู่ในเดือนนี้ (ถ้าเริ่มก่อนเดือน ใช้ต้นเดือน)
  const groups={};
  items.forEach(l=>{
    let key=String(l.start_date); if(key<mStart) key=mStart;
    (groups[key]=groups[key]||[]).push(l);
  });
  const keys=Object.keys(groups).sort();

  let html='';
  keys.forEach(k=>{
    const rows=groups[k].slice().sort((a,b)=>{
      const na=(empMap[a.employee_id]&&empMap[a.employee_id].nickname)||a.employee_id;
      const nb=(empMap[b.employee_id]&&empMap[b.employee_id].nickname)||b.employee_id;
      return String(na).localeCompare(String(nb),'th');
    });
    const isToday=(k===todayIso);
    html+='<div class="dgrp"><div class="dhead'+(isToday?' today':'')+'">'+thDate(k)+
      (isToday?' · วันนี้':'')+'<span class="cnt">· ลา '+rows.length+' คน</span></div>';
    rows.forEach(l=>{
      const e=empMap[l.employee_id]||{};
      const name=e.nickname||e.full_name||l.employee_id;
      const isMe=(l.employee_id===ID.employee_id);
      const tl=LEAVE_LABEL[l.leave_type]||l.leave_type||'ลา';
      const s=String(l.start_date), en=String(l.end_date||l.start_date);
      let range = (s===en)?thDate(s):(thDate(s)+' – '+thDate(en));
      if(l.half_day) range+=' · ครึ่งวัน';
      html+='<div class="row'+(isMe?' me':'')+'">'+
        '<span class="nm"><b>'+esc(name)+'</b>'+(e.position?'<span class="span">'+esc(e.position)+'</span>':'')+
        (isMe?'<span class="me-pill">คุณ</span>':'')+'<span class="span">'+esc(range)+'</span></span>'+
        '<span class="tp">'+esc(tl)+'</span></div>';
    });
    html+='</div>';
  });
  $('list').innerHTML=html;
}
init();
</script></body></html>
