<!DOCTYPE html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>งานของฉัน · Yiaoya</title>
<link rel="stylesheet" href="m-shared.css">
<style>
.sec{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:700;margin-bottom:10px}
.num{width:23px;height:23px;border-radius:50%;background:var(--teal);color:#04342C;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.flbl{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
.hint{font-size:11.5px;color:var(--faint);margin-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:8px 13px;border:1px solid var(--border);border-radius:99px;font-size:13px;cursor:pointer;background:#fff}
.chip.on{background:var(--teal);color:#04342C;border-color:var(--teal);font-weight:700}
/* — m-tasks specific (สอดคล้องโทนแบรนด์) — */
.grp{font-size:12px;letter-spacing:1px;font-weight:700;color:var(--muted);margin:14px 2px 8px}
.task .tt{font-size:14.5px;font-weight:700;color:var(--navy);margin-bottom:6px;line-height:1.4}
.task .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.task .dt{font-size:11.5px;color:var(--faint);margin-top:8px}
.badge{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.badge.high{background:#FEE2E2;color:#b91c1c}.badge.normal{background:#E0F2FE;color:#0369a1}.badge.low{background:#F1F5F9;color:#64748b}
.task.done{opacity:.7}.task.done .tt{text-decoration:line-through;color:var(--muted)}
.done-pill{background:#E6F7F5;color:#0F766E;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.btn-done{width:100%;margin-top:11px;padding:11px;background:var(--teal);color:#04342C;border:none;border-radius:10px;font-size:13.5px;font-weight:800;cursor:pointer}
.btn-done:disabled{opacity:.45}
.empty{text-align:center;color:var(--faint);font-size:14px;padding:40px 10px}
</style></head>
<body>
<div id="app" style="display:none">
  <div class="note">งานที่ได้รับมอบหมาย · กด"ทำเสร็จ"เมื่อทำงานเรียบร้อยแล้ว</div>
  <div id="list"></div>
</div>
<div id="block" style="display:none"></div>
<script type="module">
import { ID, $, api, mountHead, requireSession, esc } from './m-shared.js';
mountHead('งานของฉัน');
const PLBL={high:'สำคัญ',normal:'ปกติ',low:'ไม่เร่ง'};
function fmtDate(d){if(!d)return '';const x=new Date(d);if(isNaN(x))return esc(d);return x.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}
function card(t){
  const done=t.status==='done';
  const pr=(t.priority||'normal');
  const due=t.due_date?`<span>ครบกำหนด ${fmtDate(t.due_date)}</span>`:'';
  const badge=done?`<span class="done-pill">เสร็จแล้ว</span>`:`<span class="badge ${PLBL[pr]?pr:'normal'}">${PLBL[pr]||'ปกติ'}</span>`;
  const detail=t.detail?`<div class="dt">${esc(t.detail)}</div>`:'';
  const btn=done?'':`<button class="btn-done" data-id="${esc(t.task_id)}">ทำเสร็จ</button>`;
  return `<div class="card task ${done?'done':''}"><div class="tt">${esc(t.title)}</div>
    <div class="meta">${badge}${due}</div>${detail}${btn}</div>`;
}
function render(items){
  const open=items.filter(t=>t.status!=='done'), done=items.filter(t=>t.status==='done');
  if(!items.length){$('list').innerHTML='<div class="empty">ไม่มีงานค้าง</div>';return;}
  let html='';
  if(open.length){html+='<div class="grp">งานที่ต้องทำ ('+open.length+')</div>'+open.map(card).join('');}
  if(done.length){html+='<div class="grp">เสร็จแล้ว ('+done.length+')</div>'+done.map(card).join('');}
  if(!open.length&&done.length){html='<div class="empty">ไม่มีงานค้าง</div>'+html;}
  $('list').innerHTML=html;
  $('list').querySelectorAll('.btn-done').forEach(b=>b.onclick=()=>complete(b));
}
async function complete(btn){
  const id=btn.dataset.id;btn.disabled=true;btn.textContent='กำลังบันทึก…';
  const r=await api('hr_task',{action:'complete',task_id:id});
  if(r.error){btn.disabled=false;btn.textContent='ทำเสร็จ';alert('ผิดพลาด: '+r.error);return;}
  await load();
}
async function load(){
  const r=await api('hr_task?assignee_id='+encodeURIComponent(ID.employee_id));
  if(r.error){$('list').innerHTML='<div class="empty">โหลดงานไม่สำเร็จ · '+esc(r.error)+'</div>';return;}
  render(r.items||[]);
}
async function init(){
  if(!await requireSession()) return;
  $('list').innerHTML='<div class="empty">กำลังโหลด…</div>';
  await load();
}
init();
</script></body></html>
