<!DOCTYPE html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>เบิกค่าใช้จ่าย · Yiaoya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
:root{--navy:#0D2F4F;--teal:#3DC5B7;--border:#E5E7EB;--muted:#6B7280;--faint:#94a3b8;--bg:#F8F9FA;--text:#333333}
*{box-sizing:border-box;font-family:'Inter','Noto Sans Thai',-apple-system,system-ui,sans-serif}
body{margin:0;background:var(--bg);color:var(--text);padding:14px 14px 96px;max-width:480px;margin:0 auto}
.head{background:linear-gradient(135deg,#0D2F4F 0%,#0F766E 100%);color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.head .eb{color:#9FE1CB;font-size:11px;letter-spacing:2px;font-weight:700}
.head h1{font-size:19px;margin:3px 0 2px}.head .who{font-size:12.5px;color:#9fb6c9}
.note{background:#E6F7F5;color:#0F766E;border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:12px;line-height:1.5}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:11px;border:1px solid var(--border)}
.sec{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:700;margin-bottom:10px}
.num{width:23px;height:23px;border-radius:50%;background:var(--teal);color:#04342C;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
input,textarea,select{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff}
.row{display:flex;gap:10px}.row>div{flex:1}
.flbl{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
.hint{font-size:11.5px;color:var(--faint);margin-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:8px 13px;border:1px solid var(--border);border-radius:99px;font-size:13px;cursor:pointer;background:#fff}
.chip.on{background:var(--teal);color:#04342C;border-color:var(--teal);font-weight:700}
.cta{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;padding:12px 14px;background:rgba(241,245,249,.96);border-top:1px solid var(--border);backdrop-filter:blur(6px)}
.cta button{width:100%;padding:14px;background:var(--teal);color:#04342C;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer}
.cta button:disabled{opacity:.45}
.msg{text-align:center;font-size:13px;margin-top:7px;min-height:18px;line-height:1.5}
.warn{background:#FEF3C7;color:#92400e;border-radius:10px;padding:13px;font-size:13px;line-height:1.6}
a.lk{color:var(--teal);font-weight:700;text-decoration:none}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:0}
.hcat{font-size:13.5px;font-weight:600}.hdesc{font-size:11.5px;color:var(--faint);margin-top:2px;line-height:1.4}
.amt{font-weight:700;color:var(--navy);font-size:14px}
.pill{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;margin-top:4px}
.p_pending{background:#FAEEDA;color:#854F0B}.p_approved{background:#E6F7F5;color:#0F766E}
.p_paid{background:#EAF3DE;color:#173404}.p_rejected{background:#FCEBEB;color:#791F1F}
.empty{color:var(--faint);font-size:13px;text-align:center;padding:12px}
</style></head>
<body>
<div class="head"><div class="eb">YIAOYA · HR</div><h1>เบิกค่าใช้จ่าย</h1><div class="who" id="who">—</div></div>
<div id="app" style="display:none">
  <div class="note">พนักงานสำรองจ่าย → เบิกคืน · ใบเสร็จตัวจริงนำส่งแผนกบัญชีเพื่อตรวจ+เซ็นเอกสาร · จ่ายคืนพร้อมรอบเงินเดือนถัดไป</div>
  <div class="card"><div class="sec"><span class="num">1</span>หมวดค่าใช้จ่าย</div>
    <div class="chips" id="chips"></div>
    <div class="hint" id="catHint"></div></div>
  <div class="card"><div class="sec"><span class="num">2</span>จำนวนเงิน (บาท)</div>
    <input type="number" id="fAmount" min="1" step="1" inputmode="decimal" placeholder="0"></div>
  <div class="card"><div class="sec"><span class="num">3</span>รายละเอียด</div>
    <textarea id="fDesc" rows="3" maxlength="200" placeholder="เช่น ค่าแท็กซี่ไปอบรม CPR ที่ รพ.บำรุงราษฎร์"></textarea>
    <div class="hint">ไม่เกิน 200 ตัวอักษร</div></div>
  <div class="card"><div class="sec"><span class="num">4</span>ประวัติการเบิกของฉัน</div>
    <div id="history"><div class="empty">กำลังโหลด…</div></div></div>
</div>
<div class="cta" id="cta" style="display:none"><button id="send" disabled>ยื่นเบิก</button><div class="msg" id="msg"></div></div>
<div id="block" style="display:none"><div class="warn" id="blockmsg"></div></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL="https://iyldrlzhftylewstfmsg.supabase.co", ANON="sb_publishable_jLTyhyQ60OBRiT7CATCNDg_7bhmMrCK";
const sb=createClient(SB_URL,ANON);
const $=(id)=>document.getElementById(id);
// category enum ตรงกับ edge fn hr_expense_claim (EXPENSE_CATEGORIES) เป๊ะ — key,label,auto_threshold
const CATS=[
  {k:'travel',  label:'ค่าเดินทาง',      hint:'อนุมัติอัตโนมัติ ≤ 1,000 บาท'},
  {k:'supplies',label:'อุปกรณ์สำนักงาน', hint:'อนุมัติอัตโนมัติ ≤ 500 บาท'},
  {k:'training',label:'ค่าอบรม/สัมมนา',  hint:'อนุมัติอัตโนมัติ ≤ 2,000 บาท'},
  {k:'medical', label:'ค่ารักษา/ฉุกเฉิน', hint:'อนุมัติอัตโนมัติ ≤ 1,000 บาท'},
  {k:'client',  label:'ค่ารับรองลูกค้า',  hint:'ต้องผ่าน HR อนุมัติ'},
  {k:'other',   label:'อื่น ๆ',          hint:'ต้องผ่าน HR อนุมัติ'},
];
const STATUS={pending:{t:'รออนุมัติ',c:'p_pending'},pending_hr:{t:'รอ HR',c:'p_pending'},pending_acct:{t:'รอบัญชี',c:'p_pending'},approved:{t:'อนุมัติ · รอจ่าย',c:'p_approved'},paid:{t:'จ่ายแล้ว',c:'p_paid'},rejected:{t:'ไม่อนุมัติ',c:'p_rejected'}};
let ID=null; try{ID=JSON.parse(localStorage.getItem('yy_line_id')||'null');}catch(e){}
let cat='';
const block=(h)=>{$('block').style.display='block';$('blockmsg').innerHTML=h;};
async function token(){return (await sb.auth.getSession()).data.session?.access_token;}
async function api(path,body){const t=await token();const r=await fetch(SB_URL+'/functions/v1/'+path,{method:body?'POST':'GET',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json',apikey:ANON},body:body?JSON.stringify(body):undefined});return r.json();}
function validate(){const ok=cat&&Number($('fAmount').value)>0;$('send').disabled=!ok;}
async function loadHistory(){
  const r=await api('hr_expense_claim');
  const all=(r&&r.items)||[];
  const mine=all.filter(x=>x&&x.employee_id===ID.employee_id);
  if(!mine.length){$('history').innerHTML='<div class="empty">ยังไม่มีรายการเบิก</div>';return;}
  $('history').innerHTML=mine.map(x=>{
    const s=STATUS[x.status]||{t:x.status,c:'p_pending'};
    return `<div class="hrow"><div><div class="hcat">${x.category_label||x.category}</div>`
      +`<div class="hdesc">${(x.description||'')}${x.claim_id?'<br>'+x.claim_id:''}</div></div>`
      +`<div style="text-align:right"><div class="amt">฿ ${Math.round(Number(x.amount)||0).toLocaleString()}</div>`
      +`<span class="pill ${s.c}">${s.t}</span></div></div>`;
  }).join('');
}
async function init(){
  if(!ID||!ID.employee_id){block('ยังไม่ได้เข้าระบบ — กรุณาเข้าผ่าน LINE ก่อน<br><a class="lk" href="login.html">เข้าสู่ระบบด้วย LINE →</a>');return;}
  $('who').textContent=(ID.employee_name||ID.display_name)+' · '+ID.employee_id;
  let {data:s}=await sb.auth.getSession();
  if(!s.session){const r=await sb.auth.signInAnonymously();if(r.error){block('ระบบยังไม่เปิด anonymous sign-in<br><small>แจ้งแอดมินเปิดใน Supabase → Auth</small>');return;}}
  $('app').style.display='block';$('cta').style.display='block';
  $('chips').innerHTML=CATS.map(c=>`<span class="chip" data-k="${c.k}">${c.label}</span>`).join('');
  $('chips').onclick=(e)=>{const c=e.target.closest('.chip');if(!c)return;cat=c.dataset.k;
    [...$('chips').children].forEach(x=>x.classList.toggle('on',x===c));
    $('catHint').textContent=(CATS.find(z=>z.k===cat)||{}).hint||'';validate();};
  $('fAmount').oninput=validate;
  $('send').onclick=submit;
  loadHistory();
}
async function submit(){
  const amount=Number($('fAmount').value);
  $('send').disabled=true;$('msg').style.color='var(--muted)';$('msg').textContent='กำลังส่ง…';
  const r=await api('hr_expense_claim',{employee_id:ID.employee_id,branch_id:ID.branch_id||'',
    category:cat,amount,description:$('fDesc').value.trim(),
    claimed_by:ID.employee_name||ID.display_name});
  if(r.error){$('send').disabled=false;$('msg').style.color='#b91c1c';$('msg').textContent='ผิดพลาด: '+r.error;return;}
  $('msg').style.color='#0f766e';$('msg').textContent='ยื่นเบิกแล้ว ('+(r.id||'')+') · นำใบเสร็จตัวจริงส่งบัญชี';
  $('fAmount').value='';$('fDesc').value='';
  loadHistory();
}
init();
</script></body></html>
